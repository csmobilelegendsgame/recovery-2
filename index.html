<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mohon pilih akun yang ingin Anda kem...</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: #F7F9FA; height: 100vh; display: flex; flex-direction: column; justify-content: space-between; user-select: none; }
        
        /* Header */
        .header { background: #3B66A4; color: white; text-align: center; padding: 15px; font-size: 14px; position: relative; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-left: 40px; padding-right: 40px; }
        .btn-back-top { position: absolute; left: 15px; color: white; text-decoration: none; font-weight: bold; cursor: pointer; }
        
        /* Content Form */
        .content { flex: 1; padding: 20px 16px; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 14px; color: #666; margin-bottom: 8px; padding-left: 4px; }
        .input-field { w-full: 100%; width: 100%; background: white; border: 1px solid #EAEAEA; border-radius: 8px; padding: 14px 16px; font-size: 16px; color: #333; outline: none; }
        .input-field::placeholder { color: #BBB; }
        
        /* Footer Buttons (Dua Tombol Berdampingan) */
        .footer { padding: 16px; }
        .btn-container { display: flex; gap: 12px; margin-bottom: 15px; }
        .btn { flex: 1; border: none; padding: 14px; border-radius: 10px; font-size: 16px; font-weight: 500; cursor: pointer; text-align: center; }
        
        /* Tombol Kembali (Putih) */
        .btn-white { background: white; color: #555; border: 1px solid #EAEAEA; shadow-sm: 0 1px 2px rgba(0,0,0,0.05); }
        .btn-white:active { background: #F0F2F3; }
        
        /* Tombol Berikutnya (Biru) */
        .btn-blue { background: #1A8CFF; color: white; }
        .btn-blue:active { background: #0073E6; }
        
        .wm { text-align: center; font-size: 10px; color: #AAA; }
    </style>
</head>
<body>

    <div class="header">
        <span class="btn-back-top" onclick="kembaliLink()">&#10094;</span>
        Mohon pilih akun yang ingin Anda kem...
    </div>

    <div class="content">
        <div class="input-group">
            <label>ID Akun</label>
            <input type="text" class="input-field" placeholder="123456789">
        </div>

        <div class="input-group">
            <label>Server</label>
            <input type="text" class="input-field" placeholder="1234">
        </div>
    </div>

    <div class="footer">
        <div class="btn-container">
            <button class="btn btn-white" onclick="kembaliLink()">Kembali</button>
            <button class="btn btn-blue" onclick="arahkanLink()">Berikutnya</button>
        </div>
        <div class="wm">Powered by AIHELP.NET</div>
    </div>

    <script>
        // EDIT LINK UNTUK TOMBOL KEMBALI DI SINI (Atas & Bawah sama)
        function kembaliLink() {
            window.location.href = "https://LINK-KEMBALI-KAMU.com";
        }

        // EDIT LINK UNTUK TOMBOL BERIKUTNYA DI SINI
        function arahanLink() {
            window.location.href = "https://LINK-BERIKUTNYA-KAMU.com";
        }
    </script>

</body>
</html>
